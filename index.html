<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>配信画面ランキングオーバーレイ</title>
    <style>
        /* OBS透過用の設定 */
        body {
            background-color: transparent;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        /* ランキングボード全体のコンテナ */
        .ranking-board {
            background-color: #2b2b2b;
            border-collapse: collapse;
            width: 780px; /* 見切れを防ぐために横幅を少し広げました */
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* ヘッダー行 */
        .ranking-header {
            background-color: #1e1e1e;
            border-bottom: 2px solid #555555;
        }

        .ranking-header th {
            color: #e5c158;
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 2px;
            padding: 12px 10px;
            text-align: center;
        }

        /* 各データ行 */
        .ranking-row {
            border-bottom: 1px solid #444444;
            height: 60px;
        }

        .ranking-row td {
            padding: 5px 10px;
            vertical-align: middle;
        }

        /* 各列のデザイン調整（画質・見切れ対策） */
        .col-rank {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            width: 60px;
        }

        .col-icon {
            width: 60px;
            text-align: center;
        }

        /* 🌟 画像が引き伸ばされたり見切れたりしないように設定 */
        .col-icon img {
            width: 45px;
            height: 45px;
            object-fit: contain; /* 横縦比を維持して綺麗に収める設定 */
            border-radius: 6px;
            vertical-align: middle;
            background-color: transparent; /* 背景が透過の画像も綺麗に出ます */
        }

        .col-team {
            font-size: 22px;
            font-weight: bold;
            text-align: left;
            padding-left: 15px;
        }

        .col-win, .col-loss, .col-map {
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            width: 80px;
        }
    </style>
</head>
<body>

    <table class="ranking-board">
        <thead>
            <tr class="ranking-header">
                <th>R A N K</th>
                <th></th>
                <th></th>
                <th>WIN</th>
                <th>LOSS</th>
                <th>M A P</th>
            </tr>
        </thead>
        <tbody id="ranking-data">
            </tbody>
    </table>

    <script>
        const SPREADSHEET_ID = '1nrkehLR8RLvY_-X3fMbbd3y1J4mdzUMXjeJkFeeCbdU'; 
        const SHEET_NAME = '配信表示用'; 

        // 🌟【ここに高画質な画像URLをセットします】
        // 5位のいっちーチームのURLをセットしてあります。
        // 他のチームも、リンク切れしない高画質な画像URL（Discordや外部にアップしたもの）に置き換えていけます。
        const TEAM_ICONS = {
            'ありがチーム': 'https://drive.google.com/thumbnail?sz=w100&id=1FM-kX3obM2xpOSKzz-XMtOyMQvgwGnN6', // 例：今のドライブ画像
            'たくりんチーム': '',
            'DON閣下チーム': '',
            'りすかチーム': '',
            'いっちーチーム': 'https://drive.google.com/thumbnail?sz=w100&id=1FM-kX3obM2xpOSKzz-XMtOyMQvgwGnN6', // いっちーチームの現URL
            'ころろチーム': '',
            'あんぺあチーム': '',
            'らてチーム': '',
            'いゆチーム': ''
        };

        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&range=B2:G11`;

        async function fetchRanking() {
            try {
                const response = await fetch(url);
                const text = await response.text();
                const jsonText = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\s]*)\);/)[1];
                const data = JSON.parse(jsonText);
                
                const rows = data.table.rows;
                let htmlContent = '';

                for (let i = 0; i < rows.length; i++) {
                    const cols = rows[i].c;
                    if (!cols) continue;

                    const rank  = cols[0] ? cols[0].v : ''; // B列
                    const team  = cols[2] ? cols[2].v : ''; // D列
                    const win   = cols[3] ? cols[3].v : 0;  // E列
                    const loss  = cols[4] ? cols[4].v : 0;  // F列
                    const map   = cols[5] ? cols[5].v : 0;  // G列

                    // 上記のTEAM_ICONSリストから画像を取得。なければ元のセルの値を使用
                    let finalImgUrl = '';
                    if (team && TEAM_ICONS[team]) {
                        finalImgUrl = TEAM_ICONS[team];
                    } else if (cols[1] && cols[1].v && String(cols[1].v).startsWith('http')) {
                        finalImgUrl = String(cols[1].v).trim();
                        if (finalImgUrl.includes('drive.google.com')) {
                            const idMatch = finalImgUrl.match(/id=([^&]+)/) || finalImgUrl.match(/\/d\/([^/]+)/);
                            if (idMatch) finalImgUrl = `https://drive.google.com/thumbnail?sz=w100&id=${idMatch[1]}`;
                        }
                    }

                    let imgTag = finalImgUrl ? `<img src="${finalImgUrl}">` : '';

                    htmlContent += `
                        <tr class="ranking-row">
                            <td class="col-rank">${rank}</td>
                            <td class="col-icon">${imgTag}</td>
                            <td class="col-team">${team}</td>
                            <td class="col-win">${win}</td>
                            <td class="col-loss">${loss}</td>
                            <td class="col-map">${map}</td>
                        </tr>
                    `;
                }
                document.getElementById('ranking-data').innerHTML = htmlContent;
            } catch (error) {
                console.error("ランキングデータの取得に失敗しました:", error);
            }
        }

        fetchRanking();
        setInterval(fetchRanking, 10000);
    </script>
</body>
</html>
