<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>配信画面ランキングオーバーレイ</title>
    <style>
        /* OBS透過用の設定 */
        body {
            background-color: transparent;
            color: #ffffff;
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        /* ランキングボード全体のコンテナ */
        .ranking-board {
            background-color: #2b2b2b;
            border-collapse: collapse;
            width: 750px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        /* ヘッダー行（RANK, WIN, LOSS, MAP） */
        .ranking-header {
            background-color: #1e1e1e;
            border-bottom: 2px solid #555555;
        }

        .ranking-header th {
            color: #e5c158; /* ゴールド風の文字色 */
            font-weight: bold;
            font-size: 14px;
            letter-spacing: 2px;
            padding: 8px 10px;
            text-align: center;
        }

        /* 各データ行 */
        .ranking-row {
            border-bottom: 1px solid #555555;
            height: 55px;
        }

        .ranking-row td {
            padding: 5px 10px;
            vertical-align: middle;
        }

        /* 各列の固有デザイン */
        .col-rank {
            font-size: 32px;
            font-weight: bold;
            text-align: center;
            width: 60px;
        }

        .col-icon {
            width: 50px;
            text-align: center;
        }

        .col-icon img {
            width: 45px;
            height: 45px;
            object-fit: cover;
            border-radius: 4px;
            vertical-align: middle;
        }

        .col-team {
            font-size: 20px;
            font-weight: bold;
            text-align: left;
        }

        .col-win, .col-loss, .col-map {
            font-size: 26px;
            font-weight: bold;
            text-align: center;
            width: 70px;
        }
    </style>
</head>
<body>

    <table class="ranking-board">
        <thead>
            <tr class="ranking-header">
                <th style="width: 60px;">R A N K</th>
                <th style="width: 50px;"></th>
                <th></th>
                <th style="width: 70px;">WIN</th>
                <th style="width: 70px;">LOSS</th>
                <th style="width: 70px;">M A P</th>
            </tr>
        </thead>
        <tbody id="ranking-data">
            </tbody>
    </table>

    <script>
        const SPREADSHEET_ID = '1nrkehLR8RLvY_-X3fMbbd3y1J4mdzUMXjeJkFeeCbdU'; 
        const SHEET_NAME = '配信表示用'; 

        // B2:G11の範囲を取得
        const url = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&range=B2:G11`;

        async function fetchRanking() {
            try {
                const response = await fetch(url);
                const text = await response.text();
                const jsonText = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\s]*)\);/)[1];
                const data = JSON.parse(jsonText);
                
                const rows = data.table.rows;
                let htmlContent = '';

                for (let i = 0; i < rows.length; i++) {
                    const cols = rows[i].c;
                    if (!cols) continue;

                    const rank  = cols[0] ? cols[0].v : ''; // B列：RANK
                    const team  = cols[2] ? cols[2].v : ''; // D列：チーム名
                    const win   = cols[3] ? cols[3].v : 0;  // E列：WIN
                    const loss  = cols[4] ? cols[4].v : 0;  // F列：LOSS
                    const map   = cols[5] ? cols[5].v : 0;  // G列：MAP

                    // 【超重要】=SORTや=IMAGE関数でラップされた画像URLを抽出する特殊処理
                    let imgTag = '';
                    if (cols[1]) {
                        // 1. 通常のテキストとしてのURL、またはフォーマットされた値を取得
                        let iconUrl = cols[1].v;
                        let formattedUrl = cols[1].f;
                        
                        let targetUrl = '';
                        if (typeof iconUrl === 'string' && iconUrl.startsWith('http')) {
                            targetUrl = iconUrl;
                        } else if (typeof formattedUrl === 'string' && formattedUrl.includes('http')) {
                            // =IMAGE("URL") などの数式からURLっぽい文字列を強引に抽出
                            const match = formattedUrl.match(/https?:\/\/[^\s"']+/);
                            if (match) targetUrl = match[0];
                        }

                        // 2. それでも取れない場合の特殊パターン（裏側でURLが隠れているケース）
                        if (!targetUrl && cols[1].v && typeof cols[1].v === 'string') {
                            const match = cols[1].v.match(/https?:\/\/[^\s"']+/);
                            if (match) targetUrl = match[0];
                        }

                        if (targetUrl) {
                            // URLの末尾の不要な閉じカッコやクォーテーションを掃除
                            targetUrl = targetUrl.replace(/["'\)]+$/, '');
                            imgTag = `<img src="${targetUrl}">`;
                        }
                    }

                    htmlContent += `
                        <tr class="ranking-row">
                            <td class="col-rank">${rank}</td>
                            <td class="col-icon">${imgTag}</td>
                            <td class="col-team">${team}</td>
                            <td class="col-win">${win}</td>
                            <td class="col-loss">${loss}</td>
                            <td class="col-map">${map}</td>
                        </tr>
                    `;
                }
                document.getElementById('ranking-data').innerHTML = htmlContent;
            } catch (error) {
                console.error("ランキングデータの取得に失敗しました:", error);
            }
        }

        fetchRanking();
        setInterval(fetchRanking, 10000); // 10秒ごとに自動更新
    </script>
</body>
</html>
